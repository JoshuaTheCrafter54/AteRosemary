<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Celebration</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        #countdown { font-size: 2em; }
    </style>
</head>
<body>
    <h1>Happy Birthday!</h1>
    <div id="countdown"></div>
    <canvas id="cakeCanvas" width="300" height="200"></canvas>
    <audio id="music" src="music.mp3" loop></audio>
    <script>
        // Countdown functionality
        const eventDate = new Date('2026-03-19T17:00:00Z'); // Event date
        function updateCountdown() {
            const now = new Date();
            const timeUntilEvent = eventDate - now;
            const days = Math.floor(timeUntilEvent / (1000 * 60 * 60 * 24));
            const hours = Math.floor((timeUntilEvent % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((timeUntilEvent % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeUntilEvent % (1000 * 60)) / 1000);
            document.getElementById('countdown').innerHTML = `Time until event: ${days}d ${hours}h ${minutes}m ${seconds}s`; 
        }
        setInterval(updateCountdown, 1000);

        // Cake rendering
        const canvas = document.getElementById('cakeCanvas');
        const ctx = canvas.getContext('2d');
        function drawCake() {
            ctx.fillStyle = 'pink';
            ctx.fillRect(50, 100, 200, 100); // cake base
            ctx.fillStyle = 'yellow';
            ctx.fillRect(50, 70, 200, 30); // frosting
            ctx.fillStyle = 'brown';
            for (let i = 0; i < 5; i++) {
                ctx.fillRect(75 + i * 30, 60, 10, 20); // candles
            }
        }
        drawCake();

        // Play music
        document.getElementById('music').play();

        // Fireworks and confetti functionality (simplified)
        function createFireworks() {
            alert('Happy Birthday! 🎉'); // Simple fireworks alert
        }
        setTimeout(createFireworks, 5000); // Show fireworks 5 seconds after loading

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.innerHTML = '&#127881;';
            confetti.style.position = 'absolute';
            confetti.style.fontSize = '24px';
            confetti.style.zIndex = 9999;
            confetti.style.top = Math.random() * window.innerHeight + 'px';
            confetti.style.left = Math.random() * window.innerWidth + 'px';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
        }
        setInterval(createConfetti, 300); // Create confetti every 300ms
    </script>
</body>
</html>
